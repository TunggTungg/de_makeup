
<html>
<head>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
            integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <style>
        body {
            padding: 0px;
            margin: 0px;
            font-family: Arial, Helvetica, sans-serif;
            color:white;
        }

        body, html {
                  height: 100%;
                }
            html, body {
                padding: 0px;
                margin: 0px;
                background: url('static/background.jpg');
                background-position: center;
                background-repeat: no-repeat;
                background-size: cover;
                height: 100%;
                overflow-x: scroll;
            }

        .header {
            background-color: rgba(0, 0, 0, 0.3);
            font-weight: bold;
            text-transform: uppercase;
            font-size: large;
            color:white;
            font-size: 50px;
            text-align: center;
            padding: 30px;
        }
        .footer
        {

        }

        .info
        {
            text-align:left;
            color:gray;
            width:30%;
            margin:auto;
            padding:20px;
            font-size:14px;
        }


        .content {
            width: 100%;
        }

        .upload_part {
/*            background-color: rgba(0, 0, 0, 0.3);*/
            text-align: center;
            padding: 40px;
        }

        .upload_button {
            background-color: #FEED06;
            color: black;
            padding: 15px;
            font-size: 16px;
            border: 0px;
            border-radius: 5px;
            -webkit-box-shadow: 6px 8px 18px -5px rgba(0, 0, 0, 0.38);
            -moz-box-shadow: 6px 8px 18px -5px rgba(0, 0, 0, 0.38);
            box-shadow: 6px 8px 18px -5px rgba(0, 0, 0, 0.38);
            cursor: pointer;
        }

        .upload_hint {
            margin: 10px;
            font-size: 14px;
            color: rgb(200, 200, 200);
        }

        .result_part {
            text-align: center;
            padding: 40px;
        }

        .result_title {
            font-size: 18px;
            font-weight: bold;
        }

        .result_id {
            padding: 10px;
            margin: 15px;
            font-size: 16px;

        }

        .result_id_number {
            margin: 15px;
            padding: 10px;
            padding-left: 15px;
            padding-right: 15px;
            background-color: #FEED06;
            color: black;
            font-weight: bold;
            font-size: 18px;
            border-radius: 5px;

        }
        .row {
          display: flex;
        }

        .column {
          flex: 50%;
          padding: 1px;
        }
        .picture {
            max-width: 70%;
            max-height: 70%;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        p {
          color: navy;
          text-indent: 40px;
          text-transform: uppercase;
          text-align:center;
          font-weight: bold;
        }
    </style>
</head>

<body>
<div class='header'>
    DE-MAKEUP PROJECT
</div>
<div class="row">
        <div class="column">
            <img src="{{input_img}}" style="width:100%" class="picture"> 
            <p> Make Up </p>
        </div>
        <div class="column">
            <img src="{{output_img}}" style="width:100%" class="picture">
            <p> non_Make Up </p>
        </div>
</div>

<div class='content'>
    

    <div class='upload_part'>
        <button class='upload_button' id="upload_button">Please Upload Your Image..</button>
        <div class='upload_hint' id='upload_hint'>
                Files Support: PNG, JPG và JPEG.
        </div>
        <form action="/" method="POST" enctype="multipart/form-data" id='form'>
            <input type="file" name="file" id="fileinput" style="display: none;" accept="image/*">
        </form>
    </div>

<!--     <div class='result_part'>
        {% if msg %}
        <div class='result_title'><b>Kết quả xem bói khuôn mặt bạn</b></div>
        <div class='result_id'>{{ msg }}</div>
        {% if hasface %}
        <div class='result_id'>Bạn có khuôn mặt: <span class='result_id_number'>{{ face_shape }}</span></div>
        {% endif %}
        {% if user_image %}
        <img style="max-width:160px; border-radius:1rem" src="{{ url_for('static', filename=user_image) }}?{{ rand }}"
             alt="User Image">
        {% endif %}
        {% if extra %}
        <div class='result_id'><b>Diễn giải:</b> {{ extra }}</div>
        {% endif %}
        {% endif %}
    </div> -->
</div>
<div class='footer'>

</div>

</body>
<script>

    $('#upload_button').click(function () {
        $("#fileinput").trigger('click');
    });

    $('#fileinput').change(function () {
        $('#form').submit();
        $('#upload_hint').text('Đang tải file ' + $('#fileinput')[0].files[0].name + ' lên server...');
    });


</script>

</html>
